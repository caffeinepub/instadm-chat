<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8f9fb" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d14" media="(prefers-color-scheme: dark)" />
    <meta name="description" content="Connect with friends, privately. Real-time messaging on the Internet Computer." />
    <meta property="og:title" content="Linkr — Connect with friends, privately" />
    <meta property="og:description" content="Secure, decentralized real-time messaging powered by ICP" />
    <title>Linkr — Messaging</title>
    <!-- Apply dark class before paint to prevent flash -->
    <script>
      (function() {
        var stored = localStorage.getItem('linkr_theme');
        var theme = stored || 'dark';
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
          document.documentElement.style.colorScheme = 'dark';
          document.documentElement.style.backgroundColor = '#0d0d14';
        } else {
          document.documentElement.style.colorScheme = 'light';
          document.documentElement.style.backgroundColor = '#ffffff';
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
